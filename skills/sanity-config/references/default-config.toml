# Built-in default configuration for pi-sanity
# This file is shipped with the extension and serves as the base configuration.
# User configs (global and project-level) override these defaults.

# Ask timeout in seconds (default: 30)
ask_timeout = 30

# ============================================================================
# Path Permissions
# ============================================================================

[permissions.read]
default = "allow"

# Known locations that commonly contain secrets or credentials.
# These ask for confirmation rather than deny, since the user may
# legitimately want to view them (e.g., checking ssh config).
[[permissions.read.overrides]]
path = [
  "{{HOME}}/.ssh/*",
  "{{HOME}}/.aws/**",
  "{{HOME}}/.config/gcloud/**",
  "{{HOME}}/.azure/**",
  "{{HOME}}/.netrc",
  "{{HOME}}/.pgpass",
  "{{HOME}}/.my.cnf",
  "{{HOME}}/.npmrc",
  "{{HOME}}/.pypirc",
  "{{HOME}}/.git-credentials",
  "{{HOME}}/.docker/config.json",
  "{{HOME}}/.kube/config",
]
action = "ask"
reason = "May contain credentials or secrets"

# Public SSH keys are safe to read (exception to ~/.ssh/* above)
[[permissions.read.overrides]]
path = ["{{HOME}}/.ssh/*.pub"]
action = "allow"

# Write permissions: DENY-FIRST model
# - Default: deny (catches all system directories automatically)
# - Home: ask (bigger scope)
# - CWD/TMPDIR: allow (smaller scope, listed AFTER home so it wins for paths inside CWD)
# - Git: ask (most specific, listed LAST so it wins over CWD for .git directories)
[permissions.write]
default = "deny"
reason = "Writing outside allowed locations requires explicit permission"

[[permissions.write.overrides]]
path = ["/dev/null", "/dev/stdout", "/dev/stderr"]
action = "allow"
reason = "Special device files are safe to write to"

[[permissions.write.overrides]]
path = ["{{HOME}}/**"]
action = "ask"
reason = "Writing to home directory requires confirmation"

[[permissions.write.overrides]]
path = ["{{CWD}}/**", "{{TMPDIR}}/**"]
action = "allow"

[[permissions.write.overrides]]
path = ["**/.git/**"]
action = "ask"
reason = "Modifying git internals can be dangerous"

[[permissions.write.overrides]]
path = [".pi/sanity.toml", ".pi/config.toml"]
action = "ask"
reason = "Modifying safety configuration requires confirmation"

# ============================================================================
# Command Rules
# ============================================================================
# Rules are checked in array order. LAST match wins.
# General rules first, specific overrides after.

[commands]
default = "allow"
reason = "Unknown commands default to allow (low-friction)"

# Common read commands
[[commands.rules]]
names = ["cat", "head", "tail", "less", "more", "grep", "awk", "sed", "cut", "sort", "uniq", "wc"]
positionals = { default_perm = ["read"] }

# cp: read sources, write destination
[[commands.rules]]
names = ["cp"]
positionals = { default_perm = ["read"], overrides = { "-1" = ["write"] } }
options = { "-t" = ["write"], "--target-directory" = ["write"] }

# mv: read + write on sources, write destination
[[commands.rules]]
names = ["mv"]
positionals = { default_perm = ["read", "write"], overrides = { "-1" = ["write"] } }

# rm: write (delete) files
[[commands.rules]]
names = ["rm"]
positionals = { default_perm = ["write"] }

# dd: blocked by default - rarely needed and destructive
[[commands.rules]]
names = ["dd"]
action = "deny"
reason = "dd is a low-level disk utility not typically needed in development"

# npm/pnpm: deny global installs
[[commands.rules]]
names = ["npm", "pnpm"]
flags = [
  { flag = "-g", action = "deny", reason = "Use project-local installs instead of global" },
  { flag = "--global", action = "deny", reason = "Use project-local installs instead of global" }
]

# yarn: deny global installs
[[commands.rules]]
names = ["yarn global"]
action = "deny"
reason = "Use project-local installs instead of global"

# pip/pip3: require virtual environment
[[commands.rules]]
names = ["pip", "pip3"]
pre_checks = [
  { env = "VIRTUAL_ENV", match = "", action = "deny", reason = "pip must be run inside a virtual environment" }
]
flags = [
  { flag = "--user", action = "deny", reason = "--user installs outside the virtual environment" }
]

# git push --force: ask before rewriting history
[[commands.rules]]
names = ["git push"]
flags = [
  { flag = "--force", action = "ask", reason = "Force push rewrites history" },
  { flag = "-f", action = "ask", reason = "Force push rewrites history" }
]

# User-level package managers: deny by default
[[commands.rules]]
names = ["winget", "scoop", "choco", "flatpak"]
action = "deny"
reason = "System packages should not be manipulated during project development"
