# Built-in default configuration for pi-sanity
# This file is shipped with the extension and serves as the base configuration.
# User configs (global and project-level) override these defaults.

# Global default for unknown commands - low friction approach
[commands._]
default_action = "allow"
reason = "Unknown commands default to allow (low-friction)"

# Common read commands - all aliases of the same base config
[commands.reader]
default_action = "allow"
aliases = ["cat", "head", "tail", "less", "more", "grep", "awk", "sed", "cut", "sort", "uniq", "wc"]

[commands.reader.positionals]
default_perm = "read"

# echo doesn't access files, but may have output redirects
[commands.echo]
default_action = "allow"

[permissions.read]
default = "allow"

[[permissions.read.overrides]]
path = ["{{HOME}}/.*{,/**}"]
action = "ask"
reason = "Hidden files in home directory may contain secrets"

# Allow reading npm package installations for documentation/types
[[permissions.read.overrides]]
path = ["/**/node_modules/**"]
action = "allow"
reason = "Reading installed npm package documentation and types"

[[permissions.read.overrides]]
path = ["{{HOME}}/.ssh/*.pub"]
action = "allow"

# Write permissions: DENY-FIRST model
# - Default: deny (catches all system directories automatically)
# - Home: ask (bigger scope, listed first)
# - CWD/TMPDIR: allow (smaller scope, wins over HOME for paths inside CWD)
# - Git: ask (most specific, listed LAST, wins over CWD for .git directories)
[permissions.write]
default = "deny"
reason = "Writing outside allowed locations requires explicit permission"

[[permissions.write.overrides]]
path = ["{{HOME}}/**"]
action = "ask"
reason = "Writing to home directory requires confirmation"

[[permissions.write.overrides]]
path = ["{{CWD}}/**", "{{TMPDIR}}/**"]
action = "allow"

[[permissions.write.overrides]]
path = ["**/.git/**"]
action = "ask"
reason = "Modifying git internals can be dangerous"

[[permissions.write.overrides]]
path = [".pi/sanity.toml", ".pi/config.toml"]
action = "ask"
reason = "Modifying safety configuration requires confirmation"

# Delete permissions: DENY-FIRST model
# - Default: deny (catches all system directories automatically)
# - Home: ask (bigger scope, listed first)
# - CWD/TMPDIR: allow (smaller scope, wins over HOME for paths inside CWD)
# - Git: ask (most specific, listed LAST, wins over CWD for .git directories)
[permissions.delete]
default = "deny"
reason = "Deletion outside allowed locations is not permitted"

[[permissions.delete.overrides]]
path = ["{{HOME}}/**"]
action = "ask"
reason = "Deleting from home directory requires confirmation"

[[permissions.delete.overrides]]
path = ["{{CWD}}/**", "{{TMPDIR}}/**"]
action = "allow"

[[permissions.delete.overrides]]
path = ["**/.git/**"]
action = "ask"
reason = "Deleting git internals can be dangerous"

[[permissions.delete.overrides]]
path = [".pi/sanity.toml", ".pi/config.toml"]
action = "ask"
reason = "Deleting safety configuration requires confirmation"

[commands.cp]
default_action = "allow"

[commands.cp.positionals]
default_perm = "read"
overrides = { "-1" = "write" }

[commands.cp.options]
"-t" = "write"
"--target-directory" = "write"

[commands.mv]
default_action = "allow"

[commands.mv.positionals]
default_perm = "read,delete"
overrides = { "-1" = "write" }

[commands.rm]
default_action = "allow"

[commands.rm.positionals]
default_perm = "delete"

# dd is blocked by default - rarely needed in development and can be destructive
[commands.dd]
default_action = "deny"
reason = "dd is a low-level disk utility not typically needed in development"

# Package managers - global installs are denied, use project-level installs instead
[commands.npm]
default_action = "allow"
aliases = ["pnpm"]

[commands.npm.flags]
"-g" = { action = "deny", reason = "Use project-local installs instead of global" }
"--global" = { action = "deny", reason = "Use project-local installs instead of global" }

[commands.yarn]
default_action = "allow"

[commands.yarn.flags]
"global" = { action = "deny", reason = "Use project-local installs instead of global" }

[commands.pip]
default_action = "allow"
aliases = ["pip3"]

[[commands.pip.pre_checks]]
env = "VIRTUAL_ENV"
match = ""
action = "deny"
reason = "pip must be run inside a virtual environment"

[commands.pip.flags]
"--user" = { action = "deny", reason = "--user installs outside the virtual environment" }

# User-level package managers - deny by default
[commands.winget]
default_action = "deny"
aliases = ["scoop", "choco", "flatpak"]
reason = "System packages should not be manipulated during project development"
