name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: node --test --test-reporter=spec dist/tests/unit/**/*.test.js dist/tests/integration/**/*.test.js 2>&1 | tee test-results.txt
        shell: bash

      - name: Show failed tests summary
        if: failure()
        run: |
          echo "## ❌ Failed Tests (${{ matrix.os }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Failed Test Names" >> $GITHUB_STEP_SUMMARY
          grep -E "^✖" test-results.txt | head -30 >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Error Details" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -A10 "^✖" test-results.txt | head -100 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        shell: bash

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results (${{ matrix.os }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          grep -E "^(ℹ|✔|✖)" test-results.txt | tail -10 >> $GITHUB_STEP_SUMMARY || true
        shell: bash
